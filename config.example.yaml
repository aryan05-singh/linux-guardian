# linux-guardian config
# Copy to config.yaml and edit for your server. Every path/name below is an
# example — nothing is hardcoded in the checker itself.

state_file: guardian_state.json   # circuit-breaker fix-attempt history
log_file: guardian.log
history_db: guardian_history.db   # per-run results, powers `guardian.py --report`

# Dead man's switch: ping an external uptime monitor (e.g. https://healthchecks.io,
# free tier) at the end of every successful run. If guardian itself stops
# running — cron dies, the box is off, the script starts crashing before it
# even loads this config — it can't escalate that fact about itself. The
# external service notices the ping stopped arriving and alerts you through
# its own independent channel.
# heartbeat_url: "https://hc-ping.com/your-uuid-here"

# Optional AI root-cause investigation. Requires ANTHROPIC_API_KEY in the
# environment and `pip install -r requirements-ai.txt`. Entirely separate
# from the deterministic fix path — see README's "AI root-cause
# investigation" section.
#
# enabled: true makes this fully automatic — whenever a check escalates
# (no fix, or its fix didn't hold), guardian calls the AI investigation
# itself and includes the root-cause report in the notification. No
# manual step needed; this is what makes it end-to-end rather than a
# debugging command you have to remember to run yourself.
# ai_investigate:
#   enabled: true
#   model: claude-sonnet-5
#
# Or run it manually against one check any time, whether or not
# `enabled` is set: `guardian.py --config config.yaml --investigate NAME`

notify:
  method: stdout          # stdout | webhook | telegram
  # webhook:
  # method: webhook
  # url: https://hooks.slack.com/services/XXX/YYY/ZZZ
  #
  # telegram (values below support ${ENV_VAR} interpolation so secrets never
  # sit in this file in plaintext — set TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID
  # in the environment guardian.py runs in):
  # method: telegram
  # bot_token: "${TELEGRAM_BOT_TOKEN}"
  # chat_id: "${TELEGRAM_CHAT_ID}"

circuit_breaker:
  max_auto_fixes: 3     # stop auto-fixing and escalate after this many attempts...
  window_hours: 6         # ...within this time window

checks:
  # Restart a systemd service if it's not active.
  - type: systemd_service
    name: myapp_service
    service: myapp.service
    scope: user            # user | system
    auto_fix: true

  # Free disk space by deleting old rotated logs when usage crosses threshold.
  - type: disk_space
    name: root_disk
    path: /
    threshold_pct: 90
    fix_command: "find /var/log -name '*.log.*' -mtime +14 -delete"

  # Did the nightly backup/cron job actually run? (checks a marker file's mtime)
  - type: file_freshness
    name: backup_freshness
    marker_file: /var/backups/.last-run
    max_age_hours: 26
    fix_command: "/usr/local/bin/run-backup.sh"

  # Crash-loop / recurring-error detector over a log file. No fix_command
  # here on purpose — root cause varies too much to guess safely, so this
  # always escalates instead of auto-restarting into a loop.
  - type: log_pattern
    name: app_crash_loop
    log_file: /var/log/myapp/app.log
    window_lines: 500
    pattern: "FATAL|OutOfMemoryError"
    max_matches: 3
    fix_command: null

  # Escape hatch: any shell command, 0 = healthy. Use for HTTP health
  # endpoints, custom auth checks, etc.
  - type: command
    name: api_health
    check_command: "curl -sf https://api.example.com/health"
    fix_command: "systemctl --user restart myapp.service"

  # Warn before a TLS cert expires. fix_command is typically your renewal
  # command; the check re-runs after fixing to confirm it actually renewed.
  - type: ssl_cert_expiry
    name: website_cert
    hostname: example.com
    port: 443
    warn_days: 14
    fix_command: "certbot renew --quiet"

  # Is something listening on this host:port? Good for DBs / internal APIs
  # that aren't systemd-managed.
  - type: port_open
    name: postgres_port
    host: 127.0.0.1
    port: 5432
    fix_command: "systemctl --user restart postgresql"

  # Process-level check for anything not managed by systemd (pgrep -f under
  # the hood).
  - type: process_running
    name: worker_process
    pattern: "python3 worker.py"
    fix_command: "nohup python3 /opt/myapp/worker.py &"

  # Linux-only: % of RAM used, from /proc/meminfo.
  - type: memory_usage
    name: memory
    threshold_pct: 90

  # Linux-only: 1-minute load average.
  - type: cpu_load
    name: cpu
    threshold: 8.0
